<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>動画ダウンローダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family:sans-serif;
  background:#ececec;
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}
.container{
  width:100%;
  max-width:900px;
  background:#fff;
  padding:30px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.2);
}
h1{
  text-align:center;
  margin-bottom:30px;
  color:#333;
}
.input-group{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
input{
  flex:1;
  min-width:200px;
  padding:12px;
  font-size:1em;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  padding:12px 25px;
  font-size:1em;
  border:none;
  border-radius:6px;
  background:#4CAF50;
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}
button:hover{
  background:#45a049;
}
.status{
  text-align:center;
  margin-bottom:15px;
  font-weight:bold;
  color:#555;
}
.video{
  display:flex;
  gap:20px;
  align-items:flex-start;
  flex-wrap:wrap;
}
.video-info{
  flex:1;
}
.video-info h2{
  margin:0 0 10px 0;
  font-size:1.4em;
  color:#222;
}
.video-info p{
  margin:5px 0;
  font-size:1em;
  color:#555;
}
.download{
  margin-top:15px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.download a{
  padding:10px 15px;
  background:#2196F3;
  color:#fff;
  border-radius:6px;
  text-decoration:none;
  transition:0.2s;
  font-size:0.95em;
}
.download a:hover{
  background:#0b7dda;
}
/* スマホ対応 */
@media(max-width:600px){
  .video{
    flex-direction:column;
    align-items:center;
  }
  .video-info{
    text-align:center;
  }
  .download a{
    width:100%;
    text-align:center;
  }
}
</style>
</head>
<body>
<div class="container">
  <h1>YT動画ダウンローダー</h1>
  <div class="input-group">
    <input id="url" placeholder="YouTube URL">
    <button onclick="start()">取得</button>
  </div>
  <div class="status" id="status"></div>
  <div id="result"></div>
</div>

<script>
async function fetchVideo(videoId){
  const api = "https://splendid-jelly-e731bd.netlify.app/.netlify/functions/video?v=";
  try {
    const res = await fetch(api + videoId);
    if(!res.ok) throw new Error("API失敗");
    return await res.json();
  } catch(err) {
    console.log("API失敗 ->", api);
    throw err;
  }
}

function getVideoId(url){
  const patterns = [
    /v=([^&]+)/,
    /youtu\.be\/([^?&]+)/,
    /shorts\/([^?&]+)/
  ];
  for(const pattern of patterns){
    const match = url.match(pattern);
    if(match) return match[1];
  }
  return null;
}

function createDownloadLinks(data){
  let html = "<div class='download'>";
  data.videoFormats?.forEach(f=>{
    html += `<a href="${f.url}" download target="_blank">${f.qualityLabel||f.resolution}</a>`;
  });
  data.adaptiveFormats?.filter(f=>f.type.includes("video")).forEach(f=>{
    html += `<a href="${f.url}" download target="_blank">${f.resolution} (video only)</a>`;
  });
  data.adaptiveFormats?.filter(f=>f.type.includes("audio")).forEach(f=>{
    html += `<a href="${f.url}" download target="_blank">${f.audioQuality||"audio only"}</a>`;
  });
  html += "</div>";
  return html;
}

function extractData(data){
  return {
    title: data.title,
    channelName: data.author,
    videoFormats: data.formatStreams || [],
    adaptiveFormats: data.adaptiveFormats || []
  };
}

async function start(){
  const url = document.getElementById("url").value.trim();
  const videoId = getVideoId(url);
  if(!videoId){alert("URLが正しくない"); return;}
  document.getElementById("result").innerHTML = "";
  document.getElementById("status").innerText = "取得中...";
  try{
    const data = await fetchVideo(videoId);
    const info = extractData(data);
    let html = `
      <div class="video">
        <div class="video-info">
          <h2>${info.title}</h2>
          <p>チャンネル: ${info.channelName}</p>
          ${createDownloadLinks(info)}
        </div>
      </div>`;
    document.getElementById("result").innerHTML = html;
    document.getElementById("status").innerText = "取得成功";
  }catch(e){
    document.getElementById("status").innerText = "取得失敗";
    console.log(e);
  }
}
</script>
</body>
</html>
